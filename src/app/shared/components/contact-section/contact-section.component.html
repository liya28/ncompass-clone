<section class="contact">

  <div class="contact__bg-wrapper">
    <div class="contact__bg" appParallax [speed]="0.12"></div>
  </div>

  <div class="contact__overlay"></div>

  <div class="contact__row">
    <div class="contact__content contact__enter">
      <span class="contact__eyebrow">{{ eyebrow }}</span>
      <h2 class="contact__headline">{{ headline }}</h2>
      <p class="contact__subtext">{{ subtext }}</p>

      <ul class="contact__info-list">
        @for (info of contactInfo; track info.label) {
          <li class="contact__info-item">
            <span class="contact__info-icon">
              @switch (info.icon) {
                @case ('pin') {
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21s-7-6.5-7-11a7 7 0 1 1 14 0c0 4.5-7 11-7 11z" />
                    <circle cx="12" cy="10" r="2.5" />
                  </svg>
                }
                @case ('phone') {
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                  </svg>
                }
                @case ('email') {
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <path d="m22 6-10 7L2 6" />
                  </svg>
                }
              }
            </span>
            <span class="contact__info-text">
              <span class="contact__info-label">{{ info.label }}</span>
              <span class="contact__info-value">{{ info.value }}</span>
            </span>
          </li>
        }
      </ul>
    </div>

    <div class="contact__form-card contact__enter contact__enter--2">
      <div class="contact__form-row">
        <label class="contact__field">
          <span class="contact__field-label">First Name</span>
          <input
            class="contact__input"
            type="text"
            name="firstName"
            placeholder="John"
            [ngModel]="firstName()"
            (ngModelChange)="firstName.set($event)"
          />
        </label>

        <label class="contact__field">
          <span class="contact__field-label">Last Name</span>
          <input
            class="contact__input"
            type="text"
            name="lastName"
            placeholder="Smith"
            [ngModel]="lastName()"
            (ngModelChange)="lastName.set($event)"
          />
        </label>
      </div>

      <label class="contact__field">
        <span class="contact__field-label">Email Address</span>
        <input
          class="contact__input"
          type="email"
          name="email"
          placeholder="john@example.com"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
        />
      </label>

      <label class="contact__field">
        <span class="contact__field-label">Phone Number</span>
        <input
          class="contact__input"
          type="tel"
          name="phone"
          placeholder="(555) 000-0000"
          [ngModel]="phone()"
          (ngModelChange)="phone.set($event)"
        />
      </label>

      <label class="contact__field">
        <span class="contact__field-label">Message</span>
        <textarea
          class="contact__input contact__textarea"
          name="message"
          rows="4"
          placeholder="Tell us about yourself and your interest in becoming a dealer..."
          [ngModel]="message()"
          (ngModelChange)="message.set($event)"
        ></textarea>
      </label>

      <ntv-button
        class="contact__submit"
        variant="ghost"
        color="custom"
        customColor="#7DC931"
        size="lg"
        rounded="lg"
        fontSize="16px"
        [fullWidth]="true"
        [shadow]="false"
      >
        {{ submitCta }}
      </ntv-button>
    </div>
  </div>

</section>
